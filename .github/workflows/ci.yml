name: CI

# Lint and build on every PR and on pushes to main.
on:
  push:
    branches: [main]
  pull_request:
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # The single ESPHome version CI validates against. Bump deliberately; the
  # entry file's `esphome: min_version:` is the matching runtime floor.
  ESPHOME_VERSION: "2026.5.3"

jobs:
  # ---------------------------------------------------------------------------
  # Lint: run the exact same pre-commit suite developers run locally, so
  # `pre-commit run --all-files` on a laptop matches CI. Covers YAML (yamllint)
  # and generic hygiene (trailing whitespace, EOF newline, line endings).
  #
  # pre-commit is invoked directly rather than via pre-commit/action@v3.0.1:
  # that action nests actions/cache@v4 (Node 20), and GitHub removes Node 20 on
  # 16 Sep 2026, so calling pre-commit ourselves keeps every action on Node 24.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Cache the pre-commit hook environments, keyed on the config so a hook
      # bump rebuilds them.
      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  # ---------------------------------------------------------------------------
  # Build: validate and compile the ACTUAL entry file (example/desk-lamp.yaml),
  # not a parallel CI-only file. The entry file already uses local package
  # includes and pins the DimmerLink component by commit SHA, so a PR validates
  # exactly the config and component revision it ships. A schema regression, a
  # broken !include, or a C++ error in the pinned component fails here.
  #
  # The only thing CI supplies is a throwaway secrets.yaml (the real values are
  # never committed); every key below mirrors example/secrets.yaml.example.
  # ---------------------------------------------------------------------------
  build:
    name: Build (config + compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Cache the PlatformIO toolchain/framework and the ESPHome build dir
      # (which also holds the fetched pinned DimmerLink source). The first run
      # is slow because the ESP-IDF toolchain is a large download; later runs
      # restore from cache. Bumping the pinned SHA in the entry file changes the
      # hash and refetches.
      - name: Cache PlatformIO and ESPHome build
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            .esphome
          key: pio-${{ runner.os }}-${{ hashFiles('packages/**', 'example/desk-lamp.yaml') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install "esphome==${ESPHOME_VERSION}"

      # Generate a throwaway secrets.yaml next to the entry file. The API key
      # must be a valid 32-byte base64 value or validation rejects it; the rest
      # are arbitrary non-empty strings.
      - name: Generate CI secrets
        run: |
          cat > example/secrets.yaml <<SECRETS
          wifi_ssid: "ci-ssid"
          wifi_password: "ci-wifi-password"
          wifi_ap_password: "ci-ap-password"
          api_key: "$(openssl rand -base64 32)"
          ota_password: "ci-ota-password"
          SECRETS

      # `config` first for a fast schema/merge/substitution check with a clear
      # error surface, then a full `compile` (which also compiles the C++).
      - name: Validate config
        run: esphome config example/desk-lamp.yaml

      - name: Compile firmware
        run: esphome compile example/desk-lamp.yaml
